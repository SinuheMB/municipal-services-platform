#version: '3.9'

services:
  db:
    image: postgres:16
    container_name: municipal_db
    environment:
      POSTGRES_DB: municipal_services
      POSTGRES_USER: municipal_user
      POSTGRES_PASSWORD: municipal_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
